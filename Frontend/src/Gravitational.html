<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aunt Man Microservices — N-Body Gravitational Stepper</title>
  <link rel="icon" type="image/png" href="../Resources/images/favicon.png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Override body overflow so the canvas fills the remaining height ── */
    html, body { height: 100%; overflow: hidden; }

    /* ── Two-column layout below the site header ──────────────────────── */
    #main-layout {
      display: flex;
      height: calc(100vh - 74px);   /* site header ~74px tall */
    }

    /* ── LEFT: scrollable parameter panel ─────────────────────────────── */
    #ctrl {
      width: 330px;
      min-width: 330px;
      background: rgb(32, 30, 38);
      border-right: 2px solid rgb(70, 50, 95);
      overflow-y: auto;
      padding: 14px 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      font-family: 'Courier New', monospace;
      color: beige;
    }

    /* ── RIGHT: Three.js canvas ────────────────────────────────────────── */
    #scene-area {
      flex: 1;
      position: relative;
      background: #020209;
      overflow: hidden;
    }

    /* ── Section headings ──────────────────────────────────────────────── */
    .sec {
      color: rgb(149, 107, 201);
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      border-bottom: 1px solid rgb(60, 48, 80);
      padding-bottom: 3px;
      margin-bottom: 4px;
    }

    /* ── Server status row ─────────────────────────────────────────────── */
    #srv-row { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #8888aa; }
    #dot {
      width: 9px; height: 9px; border-radius: 50%; background: #444; flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #dot.alive { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
    #dot.dead  { background: #f44336; box-shadow: 0 0 6px #f44336; }
    #dot.busy  { background: #ff9800; box-shadow: 0 0 6px #ff9800; }

    /* ── Param input rows ──────────────────────────────────────────────── */
    .prow { display: flex; align-items: center; gap: 8px; font-size: 11px; }
    .prow label { min-width: 46px; color: #aaaacc; font-size: 10px; }
    .prow input {
      flex: 1; background: #18182c; border: 1px solid #35355a;
      border-radius: 4px; color: #7fff7f; padding: 5px 7px;
      font-family: 'Courier New', monospace; font-size: 11px;
    }
    .prow input:focus { outline: none; border-color: rgb(149, 107, 201); }
    .prow .unit { font-size: 9px; color: #555577; min-width: 22px; }

    /* ── Body cards ────────────────────────────────────────────────────── */
    #bodies-wrap { display: flex; flex-direction: column; gap: 8px; }

    .bcard {
      background: rgba(255,255,255,0.04);
      border: 1px solid #252542;
      border-left: 3px solid;
      border-radius: 5px;
      padding: 8px 10px;
    }
    .bcard-hdr {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 7px;
    }
    .bcard-name { font-size: 11px; font-weight: bold; }
    .bcard-del {
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 13px; padding: 0 2px; line-height: 1;
    }
    .bcard-del:hover { color: #f44336; }

    /* 3-column grid: label | input | unit */
    .bfields {
      display: grid;
      grid-template-columns: 38px 1fr 26px;
      gap: 3px 5px;
      align-items: center;
    }
    .bfields label { font-size: 9px; color: #9999bb; text-align: right; }
    .bfields input {
      background: #0e0e1e; border: 1px solid #252542; border-radius: 3px;
      color: #7fff7f; padding: 3px 5px;
      font-family: 'Courier New', monospace; font-size: 10px; width: 100%;
    }
    .bfields input:focus { outline: none; border-color: rgb(149, 107, 201); }
    .bfields .unit { font-size: 8px; color: #444466; }

    /* ── Add-body button ───────────────────────────────────────────────── */
    #add-btn {
      align-self: flex-start;
      background: rgb(26, 36, 52); border: 1px solid #3a5a7a;
      border-radius: 4px; color: #7ab4ff; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 10px; padding: 5px 10px;
    }
    #add-btn:hover { background: rgb(35, 48, 68); }

    /* ── Preset buttons ────────────────────────────────────────────────── */
    #presets { display: flex; flex-wrap: wrap; gap: 6px; }
    .pbtn {
      background: rgb(36, 28, 50); border: 1px solid rgb(90, 65, 115);
      border-radius: 4px; color: rgb(149, 107, 201); cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 10px; padding: 5px 9px;
      transition: background 0.15s;
    }
    .pbtn:hover { background: rgb(52, 38, 72); }

    /* ── Run / Clear button row ─────────────────────────────────────────── */
    #action-row { display: flex; gap: 8px; }

    #run-btn {
      flex: 1;
      background: linear-gradient(135deg, rgb(50, 30, 85), rgb(80, 50, 120));
      border: 1px solid rgb(149, 107, 201); border-radius: 5px;
      color: #e0c0ff; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 13px;
      font-weight: bold; letter-spacing: 1px; padding: 11px;
      transition: background 0.2s;
    }
    #run-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, rgb(65, 40, 105), rgb(100, 65, 150));
    }
    #run-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #clear-btn {
      background: rgb(40, 20, 20); border: 1px solid #6a3535;
      border-radius: 5px; color: #cc8888; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px;
      padding: 11px 13px; transition: background 0.2s; white-space: nowrap;
    }
    #clear-btn:hover { background: rgb(60, 28, 28); color: #f44336; border-color: #f44336; }

    /* ── Simulation status message ─────────────────────────────────────── */
    #sim-msg { font-size: 10px; color: #8888aa; min-height: 14px; word-break: break-word; }
    #sim-msg.ok    { color: #4caf50; }
    #sim-msg.error { color: #f44336; }
    #sim-msg.busy  { color: #ff9800; }

    /* ── Three.js result overlay (top-right of canvas) ─────────────────── */
    #result-panel {
      position: absolute; top: 14px; right: 14px; width: 250px;
      background: rgba(5, 5, 25, 0.9); border: 1px solid #2a3a6a;
      border-radius: 10px; padding: 14px; z-index: 10; display: none;
      backdrop-filter: blur(4px); font-family: 'Courier New', monospace;
    }
    #result-panel h3 {
      color: #7ab4ff; font-size: 10px; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    #result-meta { font-size: 10px; color: #8888aa; margin-bottom: 8px; line-height: 1.6; }
    #result-bodies { display: flex; flex-direction: column; gap: 5px; }
    .rb-row {
      padding: 5px 7px; border-radius: 4px; border-left: 3px solid;
      background: rgba(255,255,255,0.04); font-size: 9px; color: #9999bb; line-height: 1.7;
    }
    .rb-name { font-size: 10px; font-weight: bold; margin-bottom: 1px; }

    #hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #2a3a4a; font-size: 10px; font-family: 'Courier New', monospace;
      letter-spacing: 0.5px; z-index: 10; pointer-events: none; white-space: nowrap;
    }

    /* ── CSS2D body labels ─────────────────────────────────────────────── */
    .blabel {
      font-size: 10px; font-family: 'Courier New', monospace;
      background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 3px;
      pointer-events: none; white-space: nowrap;
    }

    /* ── Playback controls ─────────────────────────────────────────────── */
    #playback { display: none; }

    #playback-btns { display: flex; align-items: center; gap: 6px; }
    .pbk-btn {
      background: rgb(36, 28, 50); border: 1px solid rgb(90, 65, 115);
      border-radius: 4px; color: rgb(190, 160, 230); cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 13px;
      width: 30px; height: 26px; display: flex; align-items: center; justify-content: center;
    }
    .pbk-btn:hover { background: rgb(55, 42, 78); }
    #frame-counter { font-size: 10px; color: #8888aa; flex: 1; text-align: right; }

    #scrubber {
      width: 100%; height: 4px; accent-color: rgb(149, 107, 201);
      cursor: pointer; margin-top: 4px;
    }
    #speed-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    #speed-row label { font-size: 9px; color: #8888aa; min-width: 36px; }
    #speed-slider { flex: 1; accent-color: rgb(149, 107, 201); cursor: pointer; }
    #speed-val { font-size: 9px; color: #7fff7f; min-width: 22px; }

    /* ── Thin scrollbar for control panel ─────────────────────────────── */
    #ctrl::-webkit-scrollbar { width: 4px; }
    #ctrl::-webkit-scrollbar-track { background: transparent; }
    #ctrl::-webkit-scrollbar-thumb { background: #353555; border-radius: 2px; }
  </style>
</head>

<body>
  <header id="Page_Title"><b>Aunt Man Microservices</b></header>
  <hr>

  <div id="main-layout">

    <!-- ═══════════════ LEFT PANEL ═══════════════════════════════════════ -->
    <div id="ctrl">

      <!-- Back navigation -->
      <a href="index.html" style="color:#9966cc;text-decoration:none;font-size:10px;font-family:'Courier New',monospace;letter-spacing:0.5px;">&#8592; Back to Index</a>

      <!-- Server status -->
      <div>
        <div class="sec">Server</div>
        <div id="srv-row">
          <div id="dot"></div>
          <span id="srv-txt">Checking…</span>
        </div>
      </div>

      <!-- Simulation parameters -->
      <div>
        <div class="sec">Simulation Parameters</div>
        <div class="prow">
          <label>dt</label>
          <input type="number" id="p-dt" value="86400" min="1" step="1">
          <span class="unit">s / step</span>
        </div>
        <div style="height:5px"></div>
        <div class="prow">
          <label>steps</label>
          <input type="number" id="p-steps" value="365" min="1" step="1">
          <span class="unit"></span>
        </div>
      </div>

      <!-- Bodies list -->
      <div>
        <div class="sec" style="display:flex;justify-content:space-between;align-items:center">
          <span>Bodies</span>
          <button id="add-btn" onclick="addBody()">+ Add Body</button>
        </div>
        <div id="bodies-wrap"></div>
      </div>

      <!-- Presets -->
      <div>
        <div class="sec">Quick Presets</div>
        <div id="presets">
          <button class="pbtn" onclick="loadPreset('sunEarth')">&#9728; Sun + Earth</button>
          <button class="pbtn" onclick="loadPreset('sunEarthJupiter')">&#9728; + Jupiter</button>
          <button class="pbtn" onclick="loadPreset('binaryStar')">&#9733; Binary Star</button>
        </div>
      </div>

      <!-- Run / Clear buttons -->
      <div id="action-row">
        <button id="run-btn" onclick="runSimulation()">&#9654;&nbsp; Run</button>
        <button id="clear-btn" onclick="clearScene()">&#x2715;&nbsp; Clear</button>
      </div>

      <!-- Status message -->
      <div id="sim-msg">Load a preset or add bodies, then click Run.</div>

      <!-- Playback controls — revealed after a successful simulation -->
      <div id="playback">
        <div class="sec">Playback</div>
        <div id="playback-btns">
          <button class="pbk-btn" onclick="restartAnim()" title="Restart">&#x23EE;</button>
          <button class="pbk-btn" id="play-btn" onclick="togglePlay()" title="Play / Pause">&#x23F8;</button>
          <span id="frame-counter">0 / 0</span>
        </div>
        <input type="range" id="scrubber" min="0" value="0" step="1">
        <div id="speed-row">
          <label>speed</label>
          <input type="range" id="speed-slider" min="1" max="30" value="1" step="1"
                 oninput="onSpeedChange(this.value)">
          <span id="speed-val">1×</span>
        </div>
      </div>

    </div><!-- /#ctrl -->

    <!-- ═══════════════ RIGHT PANEL — Three.js scene ══════════════════════ -->
    <div id="scene-area">

      <!-- Final-state result overlay -->
      <div id="result-panel">
        <h3>Final State</h3>
        <div id="result-meta"></div>
        <div id="result-bodies"></div>
      </div>

      <div id="hint">Drag to rotate &nbsp;&middot;&nbsp; Scroll to zoom &nbsp;&middot;&nbsp; Right-drag to pan</div>
    </div>

  </div><!-- /#main-layout -->

  <!-- ── Three.js via import map (CDN, no build step required) ──────────── -->
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE                        from 'three';
  import { OrbitControls }                from 'three/addons/controls/OrbitControls.js';
  import { CSS2DRenderer, CSS2DObject }   from 'three/addons/renderers/CSS2DRenderer.js';

  // ── Config ────────────────────────────────────────────────────────────────
  // Local dev:  'http://localhost:5050'
  // AWS deploy: 'http://<SERVER-EC2-PUBLIC-IP>:5050'
  const GATEWAY = 'http://localhost:5050';

  const PALETTE = [
    0xFFD700, 0x4FC3F7, 0xFF7043, 0xAB47BC, 0x66BB6A,
    0xEF5350, 0x26C6DA, 0xFFEE58, 0xEC407A, 0x78909C,
  ];

  // ── Three.js state ────────────────────────────────────────────────────────
  let scene, camera, glRenderer, labelRenderer, controls;

  // ── Animation state ───────────────────────────────────────────────────────
  let frames      = null;   // array of body-list snapshots from the server
  let bodyMeshes  = [];     // [{mesh, light|null}] — one entry per body, created once
  let starLight   = null;   // PointLight on body[0], kept across frames
  let sceneScale  = 1;      // metres → Three.js units

  let curFrame    = 0;      // current playback position (float, allows sub-step speed)
  let playing     = false;
  let speed       = 1;      // frames to advance per render tick

  // ── Boot Three.js (once) ─────────────────────────────────────────────────
  (function initScene() {
    const container = document.getElementById('scene-area');

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020209);
    scene.fog = new THREE.FogExp2(0x020209, 0.0005);

    const pos = new Float32Array(3000 * 3);
    for (let i = 0; i < pos.length; i++) pos[i] = (Math.random() - 0.5) * 8000;
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(starGeo,
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.6, sizeAttenuation: true })));

    camera = new THREE.PerspectiveCamera(
      55, container.offsetWidth / container.offsetHeight, 0.01, 200000);
    camera.position.set(0, 120, 280);

    glRenderer = new THREE.WebGLRenderer({ antialias: true });
    glRenderer.setPixelRatio(window.devicePixelRatio);
    glRenderer.setSize(container.offsetWidth, container.offsetHeight);
    container.appendChild(glRenderer.domElement);

    labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(container.offsetWidth, container.offsetHeight);
    labelRenderer.domElement.style.position     = 'absolute';
    labelRenderer.domElement.style.top          = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    scene.add(new THREE.GridHelper(600, 30, 0x0a1a3a, 0x0a1a3a));
    scene.add(new THREE.AxesHelper(25));

    controls = new OrbitControls(camera, glRenderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.minDistance   = 5;
    controls.maxDistance   = 50000;

    window.addEventListener('resize', () => {
      camera.aspect = container.offsetWidth / container.offsetHeight;
      camera.updateProjectionMatrix();
      glRenderer.setSize(container.offsetWidth, container.offsetHeight);
      labelRenderer.setSize(container.offsetWidth, container.offsetHeight);
    });

    // Main render loop — also drives animation playback
    (function loop() {
      requestAnimationFrame(loop);
      if (frames && playing) tickAnimation();
      controls.update();
      glRenderer.render(scene, camera);
      labelRenderer.render(scene, camera);
    })();
  })();

  // ── Create body meshes once from the initial frame ────────────────────────
  // Sizes are fixed at initialisation (based on mass); only positions update.
  function initBodyMeshes(initialBodies) {
    // Remove previous meshes and their CSS2D label DOM elements
    bodyMeshes.forEach(({ mesh, light, label }) => {
      scene.remove(mesh);
      if (light) scene.remove(light);
      if (label) label.element.remove();
    });
    if (starLight) { scene.remove(starLight); starLight = null; }
    bodyMeshes = [];

    // Compute scene scale from the widest coordinate across ALL frames
    let maxAbs = 1e-10;
    frames.forEach(frame =>
      frame.forEach(b => { maxAbs = Math.max(maxAbs, Math.abs(b.x), Math.abs(b.y), Math.abs(b.z)); })
    );
    sceneScale = 150 / maxAbs;

    const logMs  = initialBodies.map(b => Math.log10(Math.max(b.mass, 1)));
    const logMin = Math.min(...logMs);
    const logMax = Math.max(...logMs);

    initialBodies.forEach((b, i) => {
      const color  = new THREE.Color(PALETTE[i % PALETTE.length]);
      const t      = (logMax === logMin) ? 0.5
                     : (Math.log10(Math.max(b.mass, 1)) - logMin) / (logMax - logMin);
      const radius = 1.5 + t * 18;

      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(radius, 48, 48),
        new THREE.MeshPhongMaterial({
          color, emissive: color,
          emissiveIntensity: i === 0 ? 0.55 : 0.12,
          shininess: 80,
        })
      );
      scene.add(mesh);

      // Point light follows body[0] (the star) across frames
      let light = null;
      if (i === 0) {
        light = new THREE.PointLight(color, 3.5, 0, 1.5);
        scene.add(light);
        starLight = light;
      }

      // CSS2D label — stays attached to mesh, moves with it automatically
      const div = document.createElement('div');
      div.className   = 'blabel';
      div.textContent = `[${i + 1}]  ${b.mass.toExponential(2)} kg`;
      div.style.color = '#' + color.getHexString();
      const lbl = new CSS2DObject(div);
      lbl.position.set(0, radius + 2.5, 0);
      mesh.add(lbl);

      bodyMeshes.push({ mesh, light, label: lbl });
    });

    // Reframe camera to fit the scene
    const camDist = maxAbs * sceneScale * 1.6;
    camera.position.set(camDist * 0.4, camDist * 0.5, camDist);
    controls.target.set(0, 0, 0);
    controls.update();
  }

  // ── Apply one frame — update every body mesh position ────────────────────
  function applyFrame(frameIndex) {
    const frame = frames[Math.floor(frameIndex)];
    frame.forEach((b, i) => {
      // Physics XY = orbital plane → Three.js XZ so the orbit looks horizontal
      const x =  b.x * sceneScale;
      const y =  b.z * sceneScale;
      const z = -b.y * sceneScale;
      bodyMeshes[i].mesh.position.set(x, y, z);
      if (bodyMeshes[i].light) bodyMeshes[i].light.position.set(x, y, z);
    });
  }

  // ── Animation tick — called every render frame while playing ─────────────
  function tickAnimation() {
    curFrame = Math.min(curFrame + speed, frames.length - 1);
    applyFrame(curFrame);
    syncPlaybackUI();
    if (curFrame >= frames.length - 1) {
      playing = false;
      document.getElementById('play-btn').textContent = '\u25B6';
    }
  }

  // ── Sync the scrubber and frame counter to curFrame ───────────────────────
  function syncPlaybackUI() {
    const idx = Math.floor(curFrame);
    const total = frames.length - 1;
    document.getElementById('frame-counter').textContent = `${idx} / ${total}`;
    document.getElementById('scrubber').value = idx;
    // Update result panel with current frame's body positions
    updateResultPanel(frames[idx]);
  }

  // ── Update the result overlay bodies with the current frame state ─────────
  function updateResultPanel(frame) {
    const list = document.getElementById('result-bodies');
    const rows = list.querySelectorAll('.rb-row');
    frame.forEach((b, i) => {
      if (rows[i]) {
        rows[i].querySelector('.rb-stats').textContent =
          `x=${e(b.x)} y=${e(b.y)} z=${e(b.z)}  vx=${e(b.vx)} vy=${e(b.vy)} vz=${e(b.vz)}`;
      }
    });
  }

  // ── Build result panel (called once, then updated per frame) ──────────────
  function buildResultPanel(data) {
    document.getElementById('result-panel').style.display = 'block';

    const days = (data.steps_completed * data.dt / 86400).toFixed(2);
    document.getElementById('result-meta').innerHTML =
      `Steps: <b>${data.steps_completed}</b> &nbsp;|&nbsp; ` +
      `dt: <b>${data.dt.toExponential(2)} s</b><br>Simulated: <b>${days} days</b>`;

    const list = document.getElementById('result-bodies');
    list.innerHTML = '';
    data.bodies.forEach((b, i) => {
      const hex = '#' + new THREE.Color(PALETTE[i % PALETTE.length]).getHexString();
      const row = document.createElement('div');
      row.className = 'rb-row';
      row.style.borderColor = hex;
      row.innerHTML =
        `<div class="rb-name" style="color:${hex}">[${i + 1}]  ${b.mass.toExponential(3)} kg</div>` +
        `<div class="rb-stats">${e(b.x)} …</div>`;
      list.appendChild(row);
    });
  }

  const e = v => v.toExponential(2);

  // ── Playback controls (exposed to HTML onclick) ───────────────────────────
  window.togglePlay = function () {
    if (!frames) return;
    if (curFrame >= frames.length - 1) { curFrame = 0; }  // restart if at end
    playing = !playing;
    document.getElementById('play-btn').textContent = playing ? '\u23F8' : '\u25B6';
  };

  window.restartAnim = function () {
    if (!frames) return;
    curFrame = 0;
    playing  = true;
    document.getElementById('play-btn').textContent = '\u23F8';
    applyFrame(0);
    syncPlaybackUI();
  };

  window.clearScene = function () {
    // Stop playback
    playing  = false;
    curFrame = 0;
    frames   = null;

    // Remove all body meshes, lights, and CSS2D label DOM elements
    bodyMeshes.forEach(({ mesh, light, label }) => {
      scene.remove(mesh);
      if (light) scene.remove(light);
      if (label) label.element.remove();   // purge the DOM element from labelRenderer
    });
    bodyMeshes = [];
    if (starLight) { scene.remove(starLight); starLight = null; }

    // Reset camera to default position
    camera.position.set(0, 120, 280);
    controls.target.set(0, 0, 0);
    controls.update();

    // Hide result panel and playback section
    document.getElementById('result-panel').style.display = 'none';
    document.getElementById('playback').style.display = 'none';

    // Reset status message
    const msg = document.getElementById('sim-msg');
    msg.textContent = 'Scene cleared — load a preset or add bodies, then click Run.';
    msg.className   = '';
  };

  window.onSpeedChange = function (val) {
    speed = parseInt(val, 10);
    document.getElementById('speed-val').textContent = speed + '\u00D7';
  };

  // Scrubber drag — user can scrub to any frame
  document.getElementById('scrubber').addEventListener('input', function () {
    if (!frames) return;
    curFrame = parseInt(this.value, 10);
    applyFrame(curFrame);
    syncPlaybackUI();
  });

  // ── Server health check ───────────────────────────────────────────────────
  async function checkServer() {
    const dot = document.getElementById('dot');
    const txt = document.getElementById('srv-txt');
    try {
      const r = await fetch(GATEWAY + '/ping', { signal: AbortSignal.timeout(3000) });
      const d = await r.json();
      if (d.status === 'alive') {
        dot.className   = 'alive';
        txt.textContent = 'Server online — localhost:5050';
        return;
      }
    } catch { /* fall through */ }
    dot.className   = 'dead';
    txt.textContent = 'Server offline — run:  java Source.Server';
  }

  // ── Build JSON payload from form ──────────────────────────────────────────
  function buildPayload() {
    const dt    = parseFloat(document.getElementById('p-dt').value);
    const steps = parseInt(document.getElementById('p-steps').value, 10);

    if (!isFinite(dt)    || dt    <= 0) throw new Error('dt must be a positive number.');
    if (!isFinite(steps) || steps <= 0) throw new Error('steps must be a positive integer.');

    const cards = document.querySelectorAll('.bcard');
    if (cards.length < 2)
      throw new Error('Need at least 2 bodies. Add more or load a preset.');

    const bodies = [];
    for (const card of cards) {
      const name = card.querySelector('.bcard-name').textContent;
      const g = field => {
        const v = parseFloat(card.querySelector(`[data-f="${field}"]`).value);
        if (!isFinite(v)) throw new Error(`${name}: invalid value for "${field}".`);
        return v;
      };
      bodies.push({ mass: g('mass'), x: g('x'), y: g('y'), z: g('z'),
                    vx: g('vx'), vy: g('vy'), vz: g('vz') });
    }

    const bodyArr = bodies.map(b =>
      `{ "mass": ${b.mass}, "x": ${b.x}, "y": ${b.y}, "z": ${b.z}, ` +
      `"vx": ${b.vx}, "vy": ${b.vy}, "vz": ${b.vz} }`
    ).join(', ');

    return `{ "service": 1, "dt": ${dt}, "steps": ${steps}, "bodies": [${bodyArr}] }`;
  }

  // ── Run simulation ────────────────────────────────────────────────────────
  window.runSimulation = async function () {
    const btn = document.getElementById('run-btn');
    const msg = document.getElementById('sim-msg');
    const dot = document.getElementById('dot');

    let payload;
    try { payload = buildPayload(); }
    catch (err) { msg.textContent = err.message; msg.className = 'error'; return; }

    btn.disabled    = true;
    dot.className   = 'busy';
    msg.textContent = 'Sending to server…';
    msg.className   = 'busy';

    try {
      const resp = await fetch(GATEWAY + '/api/nbody', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: payload,
      });
      const data = await resp.json();
      if (data.status !== 'ok') throw new Error(data.message || JSON.stringify(data));

      // Store frames and initialise scene
      frames   = data.frames;
      curFrame = 0;
      playing  = true;

      initBodyMeshes(frames[0]);
      applyFrame(0);
      buildResultPanel(data);

      // Show and configure playback controls
      const pb = document.getElementById('playback');
      pb.style.display = 'block';
      const scrubber = document.getElementById('scrubber');
      scrubber.max   = frames.length - 1;
      scrubber.value = 0;
      document.getElementById('play-btn').textContent    = '\u23F8';
      document.getElementById('frame-counter').textContent = `0 / ${frames.length - 1}`;
      document.getElementById('speed-slider').value = 1;
      document.getElementById('speed-val').textContent  = '1\u00D7';
      speed = 1;

      const days = (data.steps_completed * data.dt / 86400).toFixed(1);
      msg.textContent =
        `${data.steps_completed} steps · ${days} simulated days · ${data.bodies.length} bodies.`;
      msg.className = 'ok';
      dot.className = 'alive';

    } catch (err) {
      msg.textContent = 'Error: ' + err.message;
      msg.className   = 'error';
      dot.className   = 'dead';
    } finally {
      btn.disabled = false;
    }
  };

  // ── Number display formatter ──────────────────────────────────────────────
  // type="number" inputs silently blank out values like "1.989e+30" on some
  // browsers.  Using type="text" + explicit formatting avoids this entirely.
  function fmtNum(v) {
    if (v === 0) return '0';
    const abs = Math.abs(v);
    return (abs >= 1e5 || (abs > 0 && abs < 1e-3)) ? v.toExponential(3) : String(v);
  }

  // ── Body card management ──────────────────────────────────────────────────
  let bodySeq = 0;

  window.addBody = function (defaults = {}) {
    const id  = ++bodySeq;
    const idx = document.querySelectorAll('.bcard').length;
    const hex = '#' + new THREE.Color(PALETTE[idx % PALETTE.length]).getHexString();
    const d   = {
      mass: defaults.mass ?? 1e24,
      x: defaults.x ?? 0, y: defaults.y ?? 0, z: defaults.z ?? 0,
      vx: defaults.vx ?? 0, vy: defaults.vy ?? 0, vz: defaults.vz ?? 0,
    };

    const card = document.createElement('div');
    card.className = 'bcard'; card.dataset.id = id; card.style.borderColor = hex;
    card.innerHTML = `
      <div class="bcard-hdr">
        <span class="bcard-name" style="color:${hex}">Body ${idx + 1}</span>
        <button class="bcard-del" onclick="removeBody(${id})" title="Remove">&#x2715;</button>
      </div>
      <div class="bfields">
        <label>mass</label><input data-f="mass" type="text" value="${fmtNum(d.mass)}"><span class="unit">kg</span>
        <label>x</label>   <input data-f="x"    type="text" value="${fmtNum(d.x)}"><span class="unit">m</span>
        <label>y</label>   <input data-f="y"    type="text" value="${fmtNum(d.y)}"><span class="unit">m</span>
        <label>z</label>   <input data-f="z"    type="text" value="${fmtNum(d.z)}"><span class="unit">m</span>
        <label>vx</label>  <input data-f="vx"   type="text" value="${fmtNum(d.vx)}"><span class="unit">m/s</span>
        <label>vy</label>  <input data-f="vy"   type="text" value="${fmtNum(d.vy)}"><span class="unit">m/s</span>
        <label>vz</label>  <input data-f="vz"   type="text" value="${fmtNum(d.vz)}"><span class="unit">m/s</span>
      </div>`;
    document.getElementById('bodies-wrap').appendChild(card);
    renumber();
  };

  window.removeBody = function (id) {
    const card = document.querySelector(`.bcard[data-id="${id}"]`);
    if (card) { card.remove(); renumber(); }
  };

  function renumber() {
    document.querySelectorAll('.bcard').forEach((card, idx) => {
      const hex = '#' + new THREE.Color(PALETTE[idx % PALETTE.length]).getHexString();
      card.style.borderColor = hex;
      const nm = card.querySelector('.bcard-name');
      nm.textContent = `Body ${idx + 1}`; nm.style.color = hex;
    });
  }

  // ── Presets ───────────────────────────────────────────────────────────────
  const PRESETS = {
    sunEarth: {
      dt: 86400, steps: 365,
      bodies: [
        { mass: 1.989e30, x: 0,        y: 0, z: 0, vx: 0, vy: 0,     vz: 0 },
        { mass: 5.972e24, x: 1.496e11, y: 0, z: 0, vx: 0, vy: 29780, vz: 0 },
      ],
    },
    sunEarthJupiter: {
      dt: 86400, steps: 100,
      bodies: [
        { mass: 1.989e30, x: 0,        y: 0, z: 0, vx: 0, vy: 0,     vz: 0 },
        { mass: 5.972e24, x: 1.496e11, y: 0, z: 0, vx: 0, vy: 29780, vz: 0 },
        { mass: 1.898e27, x: 7.783e11, y: 0, z: 0, vx: 0, vy: 13070, vz: 0 },
      ],
    },
    binaryStar: {
      dt: 3600, steps: 720,
      bodies: [
        { mass: 1.989e30, x: -1e11, y: 0, z: 0, vx: 0, vy: -15000, vz: 0 },
        { mass: 1.500e30, x:  1e11, y: 0, z: 0, vx: 0, vy:  20000, vz: 0 },
      ],
    },
  };

  window.loadPreset = function (key) {
    const p = PRESETS[key];
    if (!p) return;
    document.getElementById('p-dt').value    = p.dt;
    document.getElementById('p-steps').value = p.steps;
    document.getElementById('bodies-wrap').innerHTML = '';
    bodySeq = 0;
    p.bodies.forEach(b => addBody(b));
    const msg = document.getElementById('sim-msg');
    msg.textContent = 'Preset loaded — click Run Simulation.';
    msg.className   = '';
  };

  // ── Page load ─────────────────────────────────────────────────────────────
  checkServer();
  loadPreset('sunEarth');

  </script>
</body>
</html>
