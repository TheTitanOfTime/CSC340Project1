<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Stats — Aunt Man Microservices</title>
    <link rel="icon" type="image/png" href="../Resources/images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header id="Page_Title">
        <a href="/" style="color:#9966cc;text-decoration:none;font-size:12px;margin-right:16px;font-family:'Courier New',monospace;">&#8592; Back</a>
        <b>CSV Stats</b>
    </header>
    <hr>
    <br>

    <div class="Upload_File_Form">
        <form id="uploadForm">

            <input type="file" id="Upload_File" hidden>
            <label for="Upload_File" class="Custom_File_Upload"> Click or Drag to </br>Upload CSV File</label>

            <input type="submit" id="Submit_Button" value="Upload File">
        </form>
    </div>

    <div id="status" style="text-align:center;font-family:'Courier New',monospace;font-size:13px;color:#aaaacc;margin-top:16px;"></div>
    <div id="result" style="text-align:center;margin-top:12px;"></div>

    <div id="instructions">
        <ol>
            <li>Upload a <code>.csv</code> file using the area above.</li>
            <li>Click <b>Upload File</b> — the stats output will download automatically as a <code>.csv</code> file.</li>
            <li>A download link will also appear on the page if you need it again.</li>
        </ol>
    </div>

    <script src="index.js" defer></script>
</body>

</html>
