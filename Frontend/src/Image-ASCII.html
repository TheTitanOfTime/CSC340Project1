<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to ASCII — Aunt Man Microservices</title>
    <link rel="icon" type="image/png" href="../Resources/images/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header id="Page_Title">
        <a href="/" style="color:#9966cc;text-decoration:none;font-size:12px;margin-right:16px;font-family:'Courier New',monospace;">&#8592; Back</a>
        <b>Image to ASCII</b>
    </header>
    <hr>
    <br>

    <div class="Upload_File_Form">
        <form id="uploadForm">
            <input type="file" id="Upload_File" hidden>
            <label for="Upload_File" class="Custom_File_Upload"> Click or Drag <br> to Upload File</label>

            <input type="submit" id="Submit_Button" value="Upload File">
        </form>
        <br>
        <br>
        <img id="Image_Preview" src="" alt="" style="display:none; max-width:100px; margin-top:16px; border-radius:8px;">
    </div>

    <div id="instructions">
        <ol>
            <li>Upload the file you want converted to ASCII</li>
            <li>Click upload file button</li>
            <li>do something to get it back</li>
        </ol>
    </div>
    <script src="index.js" defer></script>
</body>

</html>
